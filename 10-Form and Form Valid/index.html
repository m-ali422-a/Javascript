<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        #hide{
            color: red;
            display: none;
        }
    </style>
  </head>
  <body>
    <form>
      <input id="name" type="text" name="name" placeholder="Enter Your Name" />
      <br /><br />
      <div id="hide">
        <span>Your Name is always greater than 2 characters</span>
        <br /><br />
      </div>

      <input type="email" name="email" placeholder="Enter Your email" />
      <br /><br />
      <input
        type="password"
        name="password"
        placeholder="Enter Your Password"
      />
      <br /><br />
      <select>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
      <br /><br />
      <textarea placeholder="Tell about yourself"></textarea>
      <br /><br />
      <input type="submit" />
    </form>

    <script src="./script.js"></script>
  </body>
</html>
