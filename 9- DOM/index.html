<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .parent{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      #input{
        display: none;
      }
      #btn{
        background-color: rgb(90, 87, 87);
        color: white;
        padding: 15px;
        border-radius: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>

    <input id="input" type="file">

    <div class="parent">
        <div id="btn">Upload</div>
    </div>
    

    <script src="./script.js"></script>
  </body>
</html>
