<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Calculator</title>
    <style>
        /* General Reset & Centering background */
        body {
            background: linear-gradient(135deg, #141e30, #243b55);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Calculator Container */
        #calculater {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        /* Display Screen */
        #answer {
            width: 100%;
            height: 60px;
            background-color: rgba(0, 0, 0, 0.2);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 32px;
            text-align: right;
            padding: 0 15px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        /* Button Container */
        #btn_con {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* Standard Buttons */
        .btn {
            height: 60px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Hover & Active Effects */
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* --- Updated Nth-Child Selectors for Color Themes --- */

        /* Right Column Operators (+, -, *, =) */
        .btn:nth-child(4),
        .btn:nth-child(8),
        .btn:nth-child(12) {
            background: rgba(255, 159, 10, 0.2);
            color: #ff9f0a;
            font-weight: bold;
        }
        .btn:nth-child(4):hover,
        .btn:nth-child(8):hover,
        .btn:nth-child(12):hover {
            background: rgba(255, 159, 10, 0.3);
        }

        /* Clear Button (C) */
        .btn:first-child {
            background: rgba(255, 69, 58, 0.2);
            color: #ff453a;
        }
        .btn:first-child:hover {
            background: rgba(255, 69, 58, 0.3);
        }

        /* Bottom Row Division Button (/) */
        .btn:nth-child(13) {
            background: rgba(255, 159, 10, 0.2);
            color: #ff9f0a;
            font-weight: bold;
        }
        .btn:nth-child(13):hover {
            background: rgba(255, 159, 10, 0.3);
        }

        /* Equals Button (=) */
        .btn:last-child {
            background: #ff9f0a;
            color: #fff;
            font-weight: bold;
        }
        .btn:last-child:hover {
            background: #e08b07;
        }
    </style>
  </head>
  <body>

    <div id="calculater">
        <input type="text" id="answer" readonly>
        <div id="btn_con">
            <button class="btn">C</button>
            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">+</button>
            
            <button class="btn">3</button>
            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">-</button>
            
            <button class="btn">6</button>
            <button class="btn">7</button>
            <button class="btn">8</button>
            <button class="btn">*</button>
            
            <button class="btn">/</button>
            <button class="btn">9</button>
            <button class="btn">0</button>
            <button class="btn">.</button>

            <button class="btn" style="grid-column: span 4">=</button>
        </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
